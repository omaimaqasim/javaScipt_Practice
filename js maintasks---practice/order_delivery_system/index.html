<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>order delivery system
    </title>
</head>
<body>
    <script>
       function userLogin(username,password) {
       return new Promise((resolve, reject) => {
            
            setTimeout(() => {
                if (username=="admin" && password == 1234) {
                    resolve("login successfully!")
                }
                else{
                    reject("enter correct password or username")
                }
            }, 2000);
            
        })
       

    
       
       }
//async fn return promise not resolve reject but if you reutrn whole promise inside fn and await for the promise then it will give resolve or reject
      async function getMenu() {
        
        let raw_data =  await fetch('https://jsonplaceholder.typicode.com/todos/1');
         let menu = await raw_data.json();
         return menu;
       }

       async function main() {
        console.log("welcome to our website");

        //await work when your function is returning something
      let login =  await userLogin("admin",1234);
      console.log(login)
      let menu =  await getMenu();
        console.log(menu);
    
       }
       main()
    </script>
</body>
</html>
